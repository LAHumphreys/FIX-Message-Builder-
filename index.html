<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Privacy guarantee: zero network activity after page load.
      connect-src 'none' blocks fetch/XHR/WebSocket outright; everything else
      is restricted to same-origin bundled assets. See README "Privacy model".
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>FIX Message Builder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
