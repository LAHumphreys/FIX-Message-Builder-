name: Deploy to GitHub Pages

# Two publish channels on the single Pages site this repo gets:
#
#   main -> https://<owner>.github.io/<repo>/        (stable)
#   dev  -> https://<owner>.github.io/<repo>/dev/    (rapid iteration)
#
# A Pages deployment always replaces the whole site, so every run rebuilds
# BOTH branches at their current tips and uploads them as one artifact.
# Pushing to dev therefore also redeploys main (from main's latest commit,
# unchanged), and vice versa.

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check which channel branches exist
        id: refs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          remote="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          echo "has_main=$(git ls-remote --heads "$remote" main | wc -l)" >> "$GITHUB_OUTPUT"
          echo "has_dev=$(git ls-remote --heads "$remote" dev | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        if: steps.refs.outputs.has_main == '1'
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout dev
        if: steps.refs.outputs.has_dev == '1'
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build main (site root)
        if: steps.refs.outputs.has_main == '1'
        working-directory: main
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
          npm run check:privacy
          mkdir -p ../site
          cp -r dist/. ../site/

      - name: Build dev (under /dev/)
        if: steps.refs.outputs.has_dev == '1'
        working-directory: dev
        env:
          BASE_PATH: /${{ github.event.repository.name }}/dev/
        run: |
          npm ci
          npm run build
          npm run check:privacy
          mkdir -p ../site/dev
          cp -r dist/. ../site/dev/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # The Pages backend intermittently rejects deployments with a generic
      # "Deployment failed, try again later" (seen repeatedly on rapid
      # consecutive pushes). Retry twice with a pause before giving up.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deployment.outcome == 'failure'
        name: Pause before retry
        run: sleep 45

      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deployment.outcome == 'failure' && steps.retry.outcome == 'failure'
        name: Pause before final retry
        run: sleep 90

      - id: final-retry
        if: steps.deployment.outcome == 'failure' && steps.retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
